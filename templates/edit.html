<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Worklog - IQAC Worklog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
      html { height: 100%; }
      body { background-color:#f8fafc; min-height: 100%; display: flex; flex-direction: column; }
      .main-container { flex: 1; }
      header {
        background-color:#003366;
        color:#fff;
        padding:1rem 1.5rem;
        border-radius:.5rem;
        margin-bottom:1.5rem;
        position: relative;
      }
      .logo-container { background-color: #fff; padding: 8px 12px; border-radius: 8px; display: inline-block; }
      .logo-container img { height: 75px; width: auto; }
      .header-title { color: #fff; margin: 0; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; }
      .header-title h5 { font-size: 1.25rem; font-weight: 700; margin: 0; }
      h5, h6 { margin:0; }
      .card { box-shadow:0 0.5rem 1rem rgba(0,0,0,.1); border:none; }
      .btn-primary { background-color:#003366; border-color:#003366; }
      .btn-primary:hover { background-color:#004080; border-color:#004080; }
      .toast-container { z-index:9999; }
      .form-label { font-weight:600; color:#003366; }
      .category-section { 
        border: 1px solid #dee2e6; 
        border-radius: 0.5rem; 
        padding: 1rem; 
        margin-bottom: 1rem;
        background-color: #fff;
      }
      .category-header {
        display: flex;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .category-header input[type="checkbox"] {
        margin-right: 0.5rem;
        width: 1.2rem;
        height: 1.2rem;
      }
      .category-header label {
        font-weight: 600;
        color: #003366;
        margin-bottom: 0;
        cursor: pointer;
      }
      .task-textarea {
        display: none;
      }
      .task-textarea.show {
        display: block;
      }
      .text-primary { color: #003366 !important; }
      .card { border-radius: 0.5rem; }
      footer { background: linear-gradient(135deg, #002244 0%, #003366 50%, #004080 100%); color: #fff; padding: 0.75rem 1rem; text-align: center; margin-top: auto; border-top: 3px solid #ffc107; font-size: 0.85rem; }
      footer .footer-content { display: flex; justify-content: center; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
      footer .divider { color: #ffc107; font-weight: bold; }
    </style>
  </head>

  <body>
    <div class="container py-3 main-container">
      <header class="d-flex justify-content-between align-items-center">
        <a href="/dashboard" class="text-decoration-none d-flex align-items-center">
          <div class="logo-container">
            <img src="{{ url_for('static', filename='christ_logo.png') }}" alt="CHRIST Logo">
          </div>
        </a>
        <div class="header-title">
          <h5>INTERNAL QUALITY ASSURANCE CELL (IQAC)</h5>
        </div>
        <div>
          <a href="/user_view_entries" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i> Back to Entries</a>
        </div>
      </header>

      <!-- Edit Card -->
      <div class="card mb-4">
        <div class="card-body">
          <h6 class="mb-3 text-primary">Edit Worklog Entry ({{ log['date'] | datetimeformat }})</h6>

          <form method="post" action="{{ url_for('edit', id=log['id']) }}">
            <div class="row mb-4">
              <div class="col-md-4">
                <label class="form-label">Date</label>
                <input type="text" class="form-control" value="{{ log['date'] | datetimeformat }}" disabled>
              </div>
            </div>

            <h6 class="text-primary mb-3">Edit Category-wise Tasks</h6>

            <!-- Documentation and Audits -->
            <div class="category-section">
              <div class="category-header">
                <input type="checkbox" id="cat_documentation" name="categories" value="Documentation and Audits" 
                       {% if tasks_dict and 'Documentation and Audits' in tasks_dict %}checked{% endif %}
                       onchange="toggleTask('documentation')">
                <label for="cat_documentation">Documentation and Audits</label>
              </div>
              <div id="task_documentation" class="task-textarea {% if tasks_dict and 'Documentation and Audits' in tasks_dict %}show{% endif %}">
                <textarea name="task_documentation" class="form-control" rows="3" placeholder="Enter tasks for Documentation and Audits...">{{ tasks_dict.get('Documentation and Audits', '') if tasks_dict else '' }}</textarea>
              </div>
            </div>

            <!-- Rankings -->
            <div class="category-section">
              <div class="category-header">
                <input type="checkbox" id="cat_rankings" name="categories" value="Rankings"
                       {% if tasks_dict and 'Rankings' in tasks_dict %}checked{% endif %}
                       onchange="toggleTask('rankings')">
                <label for="cat_rankings">Rankings</label>
              </div>
              <div id="task_rankings" class="task-textarea {% if tasks_dict and 'Rankings' in tasks_dict %}show{% endif %}">
                <textarea name="task_rankings" class="form-control" rows="3" placeholder="Enter tasks for Rankings...">{{ tasks_dict.get('Rankings', '') if tasks_dict else '' }}</textarea>
              </div>
            </div>

            <!-- Publications -->
            <div class="category-section">
              <div class="category-header">
                <input type="checkbox" id="cat_publications" name="categories" value="Publications"
                       {% if tasks_dict and 'Publications' in tasks_dict %}checked{% endif %}
                       onchange="toggleTask('publications')">
                <label for="cat_publications">Publications</label>
              </div>
              <div id="task_publications" class="task-textarea {% if tasks_dict and 'Publications' in tasks_dict %}show{% endif %}">
                <textarea name="task_publications" class="form-control" rows="3" placeholder="Enter tasks for Publications...">{{ tasks_dict.get('Publications', '') if tasks_dict else '' }}</textarea>
              </div>
            </div>

            <!-- Training and Development -->
            <div class="category-section">
              <div class="category-header">
                <input type="checkbox" id="cat_training" name="categories" value="Training and Development"
                       {% if tasks_dict and 'Training and Development' in tasks_dict %}checked{% endif %}
                       onchange="toggleTask('training')">
                <label for="cat_training">Training and Development</label>
              </div>
              <div id="task_training" class="task-textarea {% if tasks_dict and 'Training and Development' in tasks_dict %}show{% endif %}">
                <textarea name="task_training" class="form-control" rows="3" placeholder="Enter tasks for Training and Development...">{{ tasks_dict.get('Training and Development', '') if tasks_dict else '' }}</textarea>
              </div>
            </div>

            <!-- Strategic Initiatives -->
            <div class="category-section">
              <div class="category-header">
                <input type="checkbox" id="cat_strategic" name="categories" value="Strategic Initiatives"
                       {% if tasks_dict and 'Strategic Initiatives' in tasks_dict %}checked{% endif %}
                       onchange="toggleTask('strategic')">
                <label for="cat_strategic">Strategic Initiatives</label>
              </div>
              <div id="task_strategic" class="task-textarea {% if tasks_dict and 'Strategic Initiatives' in tasks_dict %}show{% endif %}">
                <textarea name="task_strategic" class="form-control" rows="3" placeholder="Enter tasks for Strategic Initiatives...">{{ tasks_dict.get('Strategic Initiatives', '') if tasks_dict else '' }}</textarea>
              </div>
            </div>

            <!-- Others -->
            <div class="category-section">
              <div class="category-header">
                <input type="checkbox" id="cat_others" name="categories" value="Others"
                       {% if tasks_dict and 'Others' in tasks_dict %}checked{% endif %}
                       onchange="toggleTask('others')">
                <label for="cat_others">Others</label>
              </div>
              <div id="task_others" class="task-textarea {% if tasks_dict and 'Others' in tasks_dict %}show{% endif %}">
                <textarea name="task_others" class="form-control" rows="3" placeholder="Enter other tasks...">{{ tasks_dict.get('Others', '') if tasks_dict else '' }}</textarea>
              </div>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/user_view_entries" class="btn btn-secondary ms-2">Cancel</a>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function toggleTask(category) {
        const taskDiv = document.getElementById('task_' + category);
        const checkbox = document.getElementById('cat_' + category);
        if (checkbox.checked) {
          taskDiv.classList.add('show');
        } else {
          taskDiv.classList.remove('show');
        }
      }
    </script>

    <!-- Footer -->
    <footer>
      <div class="footer-content">
        <span>Concept: <strong>Dr. Cecil Donald</strong></span>
        <span class="divider">|</span>
        <span>Developed by: <strong>Vaishnavi VK</strong> (MCA 2024-26)</span>
      </div>
    </footer>
  </body>
</html>
