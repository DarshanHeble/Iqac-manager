<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - IQAC Worklog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body {
        background-color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .forgot-card {
        max-width: 420px;
        width: 100%;
        background-color: #fff;
        border-radius: 12px;
        box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.1);
        padding: 2rem;
      }
      .header {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .header h5 {
        color: #003366;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }
      .header h6 {
        color: #555;
        font-weight: 400;
      }
      .btn-primary {
        background-color: #003366;
        border-color: #003366;
      }
      .btn-primary:hover {
        background-color: #004080;
        border-color: #004080;
      }
      .btn-outline-secondary:hover {
        background-color: #e6e6e6;
      }
      .fade-out {
        opacity: 0;
        transition: opacity 0.8s ease-out;
      }
    </style>
  </head>

  <body>
    <div class="forgot-card">
      <div class="header">
        <h5>CHRIST (Deemed to be University)</h5>
        <h6>INTERNAL QUALITY ASSURANCE CELL (IQAC)</h6>
      </div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Forgot Password Form -->
      <h6 class="text-primary text-center mb-3">Forgot Password</h6>
      <form method="post" action="/forgot_password">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Registered Email ID</label>
          <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Send Password</button>
        <a href="/login" class="btn btn-outline-secondary w-100">Back to Login</a>
      </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auto-hide alerts -->
    <script>
      setTimeout(() => {
        document.querySelectorAll('.alert').forEach(alert => {
          alert.classList.add('fade-out');
          setTimeout(() => alert.remove(), 1000);
        });
      }, 4000);
    </script>
  </body>
</html>
